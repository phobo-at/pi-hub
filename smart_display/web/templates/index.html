<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body data-watch-face="{{ initial_watch_face }}">
    <script>
      window.__SMART_DISPLAY__ = {{ {"config": ui_config, "state": initial_state}|tojson }};
    </script>

    <main class="dashboard-shell" id="dashboard-shell">
      <section class="hero-panel">
        <div class="hero-panel__inner">
          <button type="button" class="watch-face" id="watch-face" aria-label="Uhrzeit-Stil wechseln">
            <div class="watch-face__flip" id="watch-face-flip">
              <div class="flip-clock">
                {%- for position, idx in [("h1", 0), ("h2", 1), ("m1", 2), ("m2", 3)] -%}
                  <div class="flip-digit" id="flip-{{ position }}" data-value="{{ time_digits[idx] }}">
                    <div class="flip-digit__half flip-digit__half--top"><span class="flip-digit__digit">{{ time_digits[idx] }}</span></div>
                    <div class="flip-digit__half flip-digit__half--bottom"><span class="flip-digit__digit">{{ time_digits[idx] }}</span></div>
                    <div class="flip-digit__flap flip-digit__flap--top" aria-hidden="true"><span class="flip-digit__digit"></span></div>
                    <div class="flip-digit__flap flip-digit__flap--bottom" aria-hidden="true"><span class="flip-digit__digit"></span></div>
                  </div>
                  {%- if position == "h2" -%}
                    <div class="flip-clock__sep" aria-hidden="true"><span></span><span></span></div>
                  {%- endif -%}
                {%- endfor -%}
              </div>
            </div>
            <div class="watch-face__lcd" id="watch-face-lcd" aria-hidden="true">
              <svg class="lcd-clock" viewBox="0 0 400 160" role="img" aria-label="Digitaluhr">
                {%- set lcd_rects = [
                  ("a", 14, 4, 52, 8),
                  ("b", 66, 14, 8, 52),
                  ("c", 66, 74, 8, 52),
                  ("d", 14, 128, 52, 8),
                  ("e", 6, 74, 8, 52),
                  ("f", 6, 14, 8, 52),
                  ("g", 14, 66, 52, 8),
                ] -%}
                {%- set lcd_positions = [("h1", 0), ("h2", 90), ("m1", 230), ("m2", 320)] -%}
                {%- for position, x in lcd_positions -%}
                  {%- set digit = lcd_digits[loop.index0] -%}
                  <g class="lcd-digit" id="lcd-{{ position }}" data-value="{{ digit.value }}" transform="translate({{ x }}, 8)">
                    {%- for seg, rx, ry, rw, rh in lcd_rects -%}
                      <rect class="lcd-seg{% if seg in digit.segments %} is-on{% endif %}" data-seg="{{ seg }}" x="{{ rx }}" y="{{ ry }}" width="{{ rw }}" height="{{ rh }}" rx="2"></rect>
                    {%- endfor -%}
                  </g>
                {%- endfor -%}
                <g class="lcd-colon" aria-hidden="true">
                  <circle cx="210" cy="70" r="6"></circle>
                  <circle cx="210" cy="106" r="6"></circle>
                </g>
              </svg>
            </div>
            <div class="watch-face__pulse" id="watch-face-pulse" aria-hidden="true">
              <div class="pulse-clock">
                <span class="pulse-clock__hm">
                  <span id="pulse-hh">{{ initial_clock.time[:2] }}</span><span class="pulse-clock__colon">:</span><span id="pulse-mm">{{ initial_clock.time[3:] }}</span>
                </span>
                <span class="pulse-clock__ss" aria-hidden="true"><span class="pulse-clock__ss-sep">:</span><span id="pulse-ss">{{ initial_clock.seconds }}</span></span>
              </div>
            </div>
            <div class="watch-face__analog" id="watch-face-analog" aria-hidden="true">
              <svg class="analog-clock" viewBox="0 0 200 200" role="img" aria-label="Analoge Uhr" focusable="false">
                <circle class="analog-clock__face" cx="100" cy="100" r="92"></circle>
                <g class="analog-clock__ticks">
                  {%- for tick in range(12) -%}
                    <line class="analog-clock__tick analog-clock__tick--hour" x1="100" y1="14" x2="100" y2="26" transform="rotate({{ tick * 30 }} 100 100)"></line>
                  {%- endfor -%}
                  {%- for tick in range(60) -%}
                    {%- if tick % 5 != 0 -%}
                      <line class="analog-clock__tick analog-clock__tick--minute" x1="100" y1="14" x2="100" y2="20" transform="rotate({{ tick * 6 }} 100 100)"></line>
                    {%- endif -%}
                  {%- endfor -%}
                </g>
                <line class="analog-clock__hand analog-clock__hand--hour" id="analog-hand-hour" x1="100" y1="112" x2="100" y2="54" transform="rotate({{ initial_analog.hour }} 100 100)"></line>
                <line class="analog-clock__hand analog-clock__hand--minute" id="analog-hand-minute" x1="100" y1="116" x2="100" y2="30" transform="rotate({{ initial_analog.minute }} 100 100)"></line>
                <line class="analog-clock__hand analog-clock__hand--second" id="analog-hand-second" x1="100" y1="120" x2="100" y2="22" transform="rotate({{ initial_analog.second }} 100 100)"></line>
                <circle class="analog-clock__pivot" cx="100" cy="100" r="5"></circle>
              </svg>
            </div>
            <div class="watch-face__qlocktwo" id="watch-face-qlocktwo" aria-hidden="true">
              {%- set active_keys = qlocktwo_active|map("join", ",")|list -%}
              {%- for row in qlocktwo_grid -%}
                {%- set row_idx = loop.index0 -%}
                <div class="qlocktwo-row">
                  {%- for letter in row -%}
                    {%- set col_idx = loop.index0 -%}
                    {%- set cell_key = row_idx|string ~ "," ~ col_idx|string -%}
                    <span class="qlocktwo-letter{% if cell_key in active_keys %} is-active{% endif %}" data-row="{{ row_idx }}" data-col="{{ col_idx }}">{{ letter }}</span>
                  {%- endfor -%}
                </div>
              {%- endfor -%}
            </div>
            <div class="watch-face__qlocktwo-ooe" id="watch-face-qlocktwo-ooe" aria-hidden="true">
              {%- set active_keys_ooe = qlocktwo_ooe_active|map("join", ",")|list -%}
              {%- for row in qlocktwo_ooe_grid -%}
                {%- set row_idx = loop.index0 -%}
                <div class="qlocktwo-row">
                  {%- for letter in row -%}
                    {%- set col_idx = loop.index0 -%}
                    {%- set cell_key = row_idx|string ~ "," ~ col_idx|string -%}
                    <span class="qlocktwo-letter{% if cell_key in active_keys_ooe %} is-active{% endif %}" data-row="{{ row_idx }}" data-col="{{ col_idx }}">{{ letter }}</span>
                  {%- endfor -%}
                </div>
              {%- endfor -%}
            </div>
          </button>
          <div class="hero-date" id="clock-date">{{ initial_clock.date }}</div>
          <section class="hero-weather">
            <header class="hero-weather__header">
              <h2 class="hero-weather__title" id="weather-location">Wetter Zuhause</h2>
              <span class="status-pill is-hidden" id="weather-status">Laden</span>
            </header>
            <div class="hero-weather__body">
              <div class="hero-weather__temperature" id="weather-temperature">--</div>
              <div class="hero-weather__summary">
                <div class="hero-weather__icon" id="weather-icon" aria-hidden="true"></div>
                <div>
                  <div class="hero-weather__condition" id="weather-condition">Wetterdaten werden geladen.</div>
                  <div class="hero-weather__secondary" id="weather-secondary"></div>
                </div>
              </div>
            </div>
            <div class="hero-weather__forecast" id="weather-forecast"></div>
          </section>
        </div>
      </section>

      <section class="cards-column">
        <article class="card calendar-card">
          <header class="card__header">
            <h2 class="card__title">Termine</h2>
            <span class="status-pill is-hidden" id="calendar-status">Laden</span>
          </header>
          <ul class="calendar-list" id="calendar-list"></ul>
        </article>

        <article class="card spotify-card" id="spotify-card">
          <header class="card__header">
            <h2 class="card__title">Spotify Wiedergabe</h2>
            <span class="status-pill is-hidden" id="spotify-status">Laden</span>
          </header>
          <div class="spotify-body">
            <div class="spotify-artwork" id="spotify-artwork"></div>
            <div class="spotify-copy">
              <div class="spotify-track" id="spotify-track">Keine aktive Wiedergabe</div>
              <div class="spotify-artist" id="spotify-artist">Spotify nicht verbunden.</div>
              <div class="spotify-device-row">
                <div class="spotify-device-badge" id="spotify-device-badge">
                  <span class="spotify-device-badge__icon" aria-hidden="true"></span>
                  <span id="spotify-device">Kein aktives Gerät</span>
                </div>
                <div class="spotify-volume-readout" id="spotify-volume-readout"></div>
              </div>
            </div>
          </div>
          <div class="spotify-controls">
            <div class="spotify-actions">
              <button type="button" class="icon-button" id="spotify-previous" aria-label="Vorheriger Titel">
                <span class="icon-button__icon" id="spotify-previous-icon" aria-hidden="true"></span>
              </button>
              <button type="button" class="icon-button icon-button--primary" id="spotify-toggle" aria-label="Wiedergabe umschalten">
                <span class="icon-button__icon" id="spotify-toggle-icon" aria-hidden="true"></span>
              </button>
              <button type="button" class="icon-button" id="spotify-next" aria-label="Nächster Titel">
                <span class="icon-button__icon" id="spotify-next-icon" aria-hidden="true"></span>
              </button>
            </div>
            <label class="spotify-volume" for="spotify-volume">
              <span class="spotify-volume__label">Lautstärke</span>
              <input type="range" min="0" max="100" step="1" value="0" id="spotify-volume">
            </label>
          </div>
        </article>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <aside class="screensaver" id="screensaver" aria-hidden="true">
      <img class="screensaver__image screensaver__image--a is-active" id="screensaver-image-a" alt="">
      <img class="screensaver__image screensaver__image--b" id="screensaver-image-b" alt="">
      <div class="screensaver__overlay"></div>
      <div class="screensaver__fallback" id="screensaver-fallback">
        <div class="screensaver__clock" id="screensaver-clock">{{ initial_clock.time }}</div>
        <div class="screensaver__caption">Berühren zum Aufwecken</div>
      </div>
    </aside>

    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
